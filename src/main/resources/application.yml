spring:
  profiles:
    default: local
  application:
    name: notificador
  main:
    time-zone: Europe/Madrid

server:
  port: 8085

logging:
  level:
    org.apache.kafka.clients.consumer: INFO
    com.asistente.notificador: INFO

---
spring:
  config:
    activate:
      on-profile: local
  data:
    mongodb:
      uri: mongodb://localhost:27017/asistente_diario
  kafka:
    bootstrap-servers: 127.0.0.1:29092
    consumer:
      group-id: notificador
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.asistente.*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.asistente.notificador.eventos.EventoAlarmaCreada

---
spring:
  config:
    activate:
      on-profile: docker
  data:
    mongodb:
      uri: mongodb://mongo:27017/asistente_diario
  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: notificador
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.asistente.*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.asistente.notificador.eventos.EventoAlarmaCreada
